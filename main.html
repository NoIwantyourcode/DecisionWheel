<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title>Decision Maker Wheel</title>
    </head>
    <body>
        <div class="intro">
            <h1>Welcome to the Wheel of Decisions</h1>
            <p>Simply enter your choices into the wheel of decisions and click the wheel, let chance decide what you should do</p>
        </div>

        <dialog id="winnerPopup">
            <p id="winnerText"></p>
            <button id="removeWinnerBtn">Remove from wheel</button>
            <button id="closePopupBtn">Close</button>
        </dialog>

        <dialog id="errorPopup">
            <p id="errorText"></p>
            <button id="closeErrorBtn">ok</button>
        </dialog>

        <div id="layout">
            <div id="sidebar">
                <h2><strong>History</strong></h2>
                <ul id="history"></ul>
            </div>

            <div id="main">
                <canvas width="340" height="340" id="wheel">
                </canvas>
                <input type="text" id="optionInput" placeholder="Option A, Option B..." class="input">
                <button id="addBtn">Add</button>
                <ul id="optionsList"></ul>
                <p id="result"></p>
            </div>
        </div>
        
        <div>
            <button class="themeBtn" data-theme="dark">Dark</button>
            <button class="themeBtn" data-theme="Playful">Playful</button>
            <button class="themeBtn" data-theme="minimal">Minimal</button>
            <button class="themeBtn" data-theme="retro">Retro</button>
            <button class="themeBtn" data-theme="neon">Neon</button>
        </div>
        <script src="app.js"></script>
    </body>
</html>
