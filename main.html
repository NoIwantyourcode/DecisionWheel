<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title>Decision Maker Wheel</title>
    </head>
    <body>
        <div>
            <button class="themeBtn" data-theme="dark">Dark</button>
            <button class="themeBtn" data-theme="Playful">Playful</button>
            <button class="themeBtn" data-theme="minimal">Minimal</button>
            <button class="themeBtn" data-theme="retro">Retro</button>
            <button class="themeBtn" data-theme="neon">Neon</button>
        </div>
        <canvas width="340" height="340" id="wheel">
        </canvas>

        <input type="text" id="optionInput" placeholder="Option A, Option B..." class="input">
        <button id="addBtn">Add</button>
        <ul id="optionsList"></ul>

        <p id="result"></p>
        <script src="app.js"></script>
    </body>
</html>
